name: Node Build and Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Klonowanie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalacja zaleznosci
        run: npm ci

      - name: Budowanie aplikacji
        run: npm run build

      - name: Przesylanie artefaktu (katalog dist)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

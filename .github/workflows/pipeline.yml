name: Job Pipeline and Dependencies

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
    steps:
      - name: Generowanie wersji
        id: v
        run: echo "ver=1.2.3" >> $GITHUB_OUTPUT

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Uruchomienie testow dla wersji
        run: echo "Testuje wersje ${{ needs.build.outputs.ver }}"

  report:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Wypisanie raportu koncowego
        run: echo "Wersja koncowa - ${{ needs.build.outputs.ver }}"
